{% extends "base.html" %}

{% block content %}

<style>
@media (max-width: 900px) {

    body {
        background: #f4f7f8;
    }

    .layout {
        display: block;
    }

    .sidebar {
        display: none !important;
    }

    .main {
        width: 100%;
        padding: 10px;
        box-sizing: border-box;
    }
}

.mobile-wrap {
    max-width: 720px;
    margin: 0 auto;
}

.mobile-card {
    background: white;
    border-radius: 18px;
    padding: 16px;
    margin-bottom: 14px;
    border: 1px solid #dbe4e8;
}

.mobile-title {
    font-size: 24px;
    font-weight: 900;
    color: #124E64;
    margin-bottom: 6px;
}

.mobile-sub {
    font-weight: 800;
    color: #64748b;
    margin-bottom: 18px;
}

.mobile-btn {
    display: block;
    width: 100%;
    border: none;
    border-radius: 16px;
    padding: 18px;
    background: #124E64;
    color: white;
    font-size: 18px;
    font-weight: 900;
    text-align: center;
    text-decoration: none;
    margin-top: 16px;
    box-sizing: border-box;
}

.mobile-btn-sec {
    display: block;
    width: 100%;
    border-radius: 16px;
    padding: 16px;
    background: white;
    color: #124E64;
    border: 2px solid #124E64;
    font-size: 16px;
    font-weight: 900;
    text-align: center;
    text-decoration: none;
    margin-top: 10px;
    box-sizing: border-box;
}
</style>

<div class="mobile-wrap">

    <div class="mobile-card">

        <div class="mobile-title">
            Pedido #{{ pedido.id }}
        </div>

        <div class="mobile-sub">
            {{ pedido.cliente }}
        </div>

        <a
            class="mobile-btn"
            href="{{ accion.url }}">

            {{ accion.texto }}

        </a>

        <a
            class="mobile-btn-sec"
            href="{{ url_for('despacho_mobile') }}">

            Volver

        </a>

    </div>

</div>

{% endblock %}
