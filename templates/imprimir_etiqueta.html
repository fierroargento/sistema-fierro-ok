<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Imprimir etiqueta</title>

<style>
@page {
    size: A4;
    margin: 0;
}

body {
    margin: 0;
    font-family: Arial;
}

/* CONTENEDOR MEDIA HOJA */
.hoja {
    width: 100%;
    height: 50vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
}

/* AREA UTIL 90% */
.etiqueta-container {
    width: 90%;
    height: 90%;
    overflow: hidden;
    position: relative;
}

/* PDF BASE */
.pdf {
    width: 100%;
    height: auto;
    transform-origin: top center;
}

/* ===== AJUSTES POR EMPRESA ===== */

/* CORREO (recorte fuerte abajo) */
.correo .pdf {
    transform: scale(1.15) translateY(-8%);
}

/* ANDREANI (casi sin recorte) */
.andreani .pdf {
    transform: scale(1.25) translateY(-2%);
}

/* MERCADO ENVIOS */
.mercado .pdf {
    transform: scale(1.20) translateY(-5%);
}

/* ITEMS ABAJO */
.items {
    width: 90%;
    margin: 10px auto 0;
    font-size: 12px;
}
</style>
</head>

<body>

<div class="hoja">

    <!-- IMPORTANTE: cambiar clase según empresa -->
    <div class="etiqueta-container {{ tipo_envio }}">

        <img src="{{ etiqueta_url }}" class="pdf">

    </div>

</div>

<div class="items">
    <b>ITEMS DEL PEDIDO</b><br><br>
    {{ items }}
</div>

</body>
</html>
